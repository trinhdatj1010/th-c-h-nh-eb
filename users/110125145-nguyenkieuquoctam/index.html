<!DOCTYPE html>
<html>
<head>
  <title>Trang cá nhân</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to top left, #1e1e2f, #3a3a5f);
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    .container {
      margin-top: 80px;
    }

    img {
      width: 150px;
      height: 150px;
      border-radius: 50%; /* làm tròn */
      border: 4px solid white;
      object-fit: cover;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      margin-top: 15px;
    }

    .box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Ảnh -->
    <img src="image/anh.jpg" alt="avatar">

    <h1>Nguyễn kiều quốc tâm</h1>

    <div class="box">
      <p>Sinh năm: 06/05/2007</p>
      <p>Tuổi: 18</p>
      <p>Sở thích: đi tour</p>
    </div>

  </div>
</body>
</html>
