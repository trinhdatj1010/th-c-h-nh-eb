<!DOCTYPE html>
<html lang="vi">
<head>
  <title>Trang cá nhân</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to top left, #1e1e2f, #3a3a5f);/*màu background*/
      color: white;/*màu chữ*/
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    .container {
      margin-top: 80px;
    }

    img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid white; /*chỉnh khung chứa ảnh*/
      object-fit: cover;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      margin-top: 15px;
    }

    .box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px; 
      background: rgba(255,255,255,0.1);
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- ảnh -->
    <img src="image/anh.jpg" alt="avatar">

    <h1>Trình Quốc Đạt</h1>

    <div class="box">
      <p>Sinh năm: 21/12/2007</p>
      <p>Tuổi: 18</p>
      <p>Sở thích: chơi game và nghe nhạc</p>
      <p>Hiện đang học ngành công nghệ thông tin</p>
      <p>Tương lai chưa biết nên làm gì nên tạm thời giờ cứ chill trước</p>
    </div>

  </div>
</body>
</html>
