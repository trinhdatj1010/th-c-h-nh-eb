<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin sinh viên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
  	background: linear-gradient(135deg, #74ebd5, #9face6);
        }

        .container {
            width: 420px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
        }


        h3 {
            text-align: center;
            color: #333;
        }

        .profile {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        .profile img {
            width: 100px;
            height: 120px;
            border-radius: 10px;
            margin-right: 15px;
            object-fit: cover;
            border: 2px solid #ddd;
        }

        .info p {
            margin: 5px 0;
        }

        .section {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            background: #f9f9f9;
        }

        .section h4 {
            margin-bottom: 5px;
            color: #444;
        }

        .tag {
            display: inline-block;
            background: #9face6;
            color: white;
            padding: 5px 10px;
            margin: 3px;
            border-radius: 20px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">
    <h3>Thông tin sinh viên</h3>

    <div class="profile">
        <img src="avatar.jpg" alt="Ảnh đại diện">

        <div class="info">
            <p><b>Họ tên:</b> Võ Hoàng Tuấn</p>
            <p><b>MSSV:</b> 110124255</p>
            <p><b>Lớp:</b> DA24TTD</p>
            <p><b>Quê quán:</b> Trà Vinh</p>
        </div>
    </div>

    <div class="section">
        <h4>Hoạt động</h4>
        <p>- Tham gia CLB</p>
        <p>- Tình nguyện</p>
    </div>
	<a href="https://github.com/hoangtuantvu-dev" target="_blank" class="btn">
    		🔗 GitHub 
</a>
</p>
    <div class="section">
        <h4>Sở thích</h4>
        <span class="tag">💻 Code</span>
        <span class="tag">🎮 Game</span>
        <span class="tag">🎵 Nghe nhạc</span>
    </div>

    <div class="section">
        <h4>Thành tích</h4>
        <p>- Chưa có</p>
    </div>
</div>

</body>
</html>
