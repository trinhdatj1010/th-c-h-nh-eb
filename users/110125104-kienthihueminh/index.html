<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân - Huệ Minh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@100;300;400;700;900&family=Bokor&family=Hanuman:wght@100..900&family=Mea+Culpa&family=Metal&family=Momo+Signature&family=Moul&family=Noto+Sans+Khmer:wght@100..900&family=Odor+Mean+Chey&display=swap" rel="stylesheet">
</head>
<style>
   * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: url('https://jademag.com/wp-content/uploads/2019/09/slow-life.jpg');
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-size: cover;
        backdrop-filter: blur(8px);
    }

    .container {
        background: #fff;
        padding: 35px;
        width: 380px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    .container:hover {
        transform: translateY(-8px);
    }

    .ho-ten h2 {
        color: #333;
        font-family: "Momo Signature", cursive;
        margin-bottom: 20px;
        font-size: 24px;
    }

    .container img {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: 5px solid #74ebd5;
        margin-bottom: 20px;
    }

    .gioi-thieu p {
        color: #555;
        font-size: 16px;
        line-height: 1.6;
        text-align: justify;
    }
</style>
<body>
    <div class="container">
        <div class="ho-ten">
            <h2>Kiên Thị Huệ Minh</h2>
        </div>

        <img src="./assets/avt.jpg" alt="anhdaidien">

        <div class="gioi-thieu">
            <p>Sinh năm: 22/11/2007</p>
            <p>Tuổi: 18</p>
            <p>Sở thích: nghe nhạc, xem phim và ăn</p>
            <p>Hiện đang học ngành công nghệ thông tin mã lớp: DA25TTA </p>
            <p>Hoạt động: về nguồn, bảo vệ môi trường</p>
        </div>
    </div>
    
</body>
</html>
