<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin sinh viên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
        }

        .container {
            width: 420px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
        
        }

        .container:hover {
            transform: scale(1.02);
        }

        h3 {
            text-align: center;
            color: #d63384;
        }

        .profile {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        .profile img {
            width: 100px;
            height: 120px;
            border-radius: 10px;
            margin-right: 15px;
            object-fit: cover;
            border: 2px solid #ffc0cb;
        }

        .info p {
            margin: 5px 0;
        }

        .section {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            background: #fff0f5;
        }

        .section h4 {
            margin-bottom: 5px;
            color: #c2185b;
        }

        .tag {
            display: inline-block;
            background: #ff85a2;
            color: white;
            padding: 5px 10px;
            margin: 3px;
            border-radius: 20px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">
    <h3>Thông tin sinh viên</h3>

    <div class="profile">
        <img src="avatar.jpg" alt="Ảnh đại diện">

        <div class="info">
            <p><b>Họ tên:</b> Nguyễn Thị Thanh Thúy</p>
            <p><b>MSSV:</b> 110124184</p>
            <p><b>Lớp:</b> DA24TTD</p>
            <p><b>Quê quán:</b> Vĩnh Long</p>
        </div>
    </div>

    <div class="section">
        <h4>Hoạt động</h4>
        <p>- Tham gia CLB</p>
        <p>- Tình nguyện</p>
    </div>

    <div class="section">
        <h4>Sở thích</h4>
        <span class="tag">🎵 Nghe nhạc</span>
        <span class="tag">📸 Chụp ảnh</span>
        <span class="tag">🛍️ Mua sắm</span>
        <span class="tag">🎬 Xem phim</span>
    </div>

    <div class="section">
        <h4>Thành tích</h4>
        <p>- Chưa có</p>
    </div>
</div>

</body>
</html>
