<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thẻ Sinh Viên</title>

<style>
body {
    background: #f5f5f5;
    font-family: Arial;
}

.card {
    width: 520px;
    margin: 30px auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    background: white;
}

.header {
    background: linear-gradient(90deg, #007bff, #00c6ff);
    color: white;
    text-align: center;
    padding: 10px;
    font-weight: bold;
}

table {
    width: 100%;
}

td {
    padding: 10px;
}

.avatar {
    width: 120px;
    height: 150px;
    border-radius: 8px;
    border: 2px solid #007bff;
}

.section {
    background: #f0f8ff;
}

.section-title {
    font-weight: bold;
    color: #007bff;
}
</style>

</head

<body>

<div class="card">
    <div class="header">THẺ SINH VIÊN</div>

    <table>
        <tr>
            <td>
                <img src="avatar.jpg" class="avatar">
            </td>

            <td>
                <p><b>Họ Tên:</b>Nguyễn Đình Thụ</p>
                <p><b>Lớp:</b> DA25TTA</p>
                <p><b>Năm sinh:</b> 2007</p>
                <p><b>Ngành:</b> Công nghệ thông tin</p>
            </td>
        </tr>

        <tr class="section">
            <td colspan="2">
                <p class="section-title">Hoạt động</p>
                <ul>
                    <li>Đọc sách</li>
                    <li>Chơi game</li>
                </ul>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
