<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thẻ Sinh Viên - Trương Quốc Lực</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }


        .card {
            background: pink;
            width: 420px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }


        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 8px;
            background: #fcf825;
        }


        h1 {
            text-align: center;
            color: #333;
            font-size: 22px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }


        .container {
            display: flex;
            gap: 20px;
            align-items: center;
            background: #fdfdfde3;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 15px;
        }


        img {
            width: 110px;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #eee;
        }


        .info-text p {
            margin: 6px 0;
            font-size: 14px;
            color: #444;
        }


        .section {
            margin-top: 20px;
        }


        .section h3 {
            font-size: 16px;
            color: #2575fc;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }


        ul {
            margin: 0;
            padding-left: 25px;
            font-size: 14px;
            color: #555;
        }


        li { margin-bottom: 6px; }


        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 11px;
            color: #aaa;
            border-top: 1px dashed #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>


    <div class="card">
        <h1>THÔNG TIN SINH VIÊN</h1>


        <div class="container">
            <img src="anh.jpg" alt="Ảnh chân dung">


            <div class="info-text">
                <p><strong>Họ tên:</strong> Trương Quốc Lực</p>
                <p><strong>Năm sinh:</strong> 08/07/2007</p>
                <p><strong>MSSV:</strong> 110125100</p>
                <p><strong>Lớp:</strong> DA25TTA</p>
                <p><strong>Ngành:</strong> CNTT</p>
                <p><strong>Hệ:</strong> Chính Quy</p>
            </div>
        </div>
       <div class="section">
            <h3>⭐ Hoạt động</h3>
            <ul>
                <li>Nghe Nhạc & Giải trí</li>
                <li> Bóng Đá</li>
                <li>Học tập Công nghệ</li>
            </ul>
        </div>


        <div class="section">
            <h3>🏆 Thành tích</h3>
            <ul>
                <li>Giải Ba Bóng Đá Cấp Trường</li>
                <li>Sinh viên 5 tốt</li>
            </ul>
        </div>


            </div>


</body>
</html>
