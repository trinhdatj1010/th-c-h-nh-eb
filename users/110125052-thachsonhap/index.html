<!doctype html>
<html>
  <head>
    <title>Trang cá nhân</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(to bottom, #143838, #225e5e, #2f8383);
        color: white;
        font-family: "Poppins", sans-serif;
        text-align: center;
      }

      .container {
        margin-top: 80px;
      }

      img {
        width: 150px;
        height: 150px;
        border-radius: 35%; /* làm tròn */
        border: 4px solid white;
        object-fit: cover;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: 40px;
        margin-top: 15px;
      }

      .box {
        margin-top: 20px;
        padding: 20px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.1);
        display: inline-block;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Ảnh -->
      <img src="image/anh.jpg" alt="avatar" />

      <h1>THẠCH SƠN HẠP</h1>

      <div class="box">
        <p>Sinh năm: 15/07/2006</p>
        <p>Tuổi: 20</p>
        <p>Sở thích: nghe nhạc</p>
      </div>
      <h2>HOẠT ĐỘNG</h2>
      <p>Tham dự Lễ ra quân Tháng Thanh niên 2026</p>
      <p>Tết trông cây "Đời đời nhớ ơn Bác Hồ"</p>
      <p>Tham dự hỗ trợ Hội thao Giáo dục Quốc phong và An ninh</p>
      <p>Tham ra quân chủ nhật xanh</p>
    </div>
  </body>
</html>
