<<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(#C0C0C0,#888888);

            color: white;
            text-align: center;
        }

        .container {
            padding-top: 80px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-weight: bold;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 30px;
        }

        .card {
            width: 400px;
            margin: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card p {
            margin: 10px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar">avatar</div>

    <h1>Dư Trung Tín</h1>

    <div class="card">
        <p>Sinh năm: 02/08/2006</p>
        <p>Tuổi: 19</p>
        <p>Sở thích:thích được tự do làm điều mình thích,vân vân</p>
        <p>Hiện đang học ngành công nghệ thông tin</p>
        <p>Tương lai muốn có công việc ổn định để thực hiện điều mình thích</p>
    </div>
</div>

</body>
</html>
